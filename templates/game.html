
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#000}
#wrap{display:flex;gap:0;background:#0a0a0f;min-height:500px;font-family:'Courier New',monospace;user-select:none;border-radius:12px;overflow:hidden;border:1px solid #222}
#left{display:flex;flex-direction:column;flex:1;background:#0d0d14}
#hud{display:flex;justify-content:space-between;align-items:center;background:#060609;border-bottom:2px solid #1a3a1a;padding:10px 16px;gap:8px}
.htm{font-size:11px;font-weight:700;color:#39A900;text-transform:uppercase;letter-spacing:1px;max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.htr{font-size:11px;font-weight:700;color:#ff4444;text-transform:uppercase;letter-spacing:1px;max-width:90px;text-align:right;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#score{font-size:22px;font-weight:900;color:#00ff87;letter-spacing:3px;font-family:'Courier New',monospace}
#timer{font-size:12px;color:#ffaa00;font-weight:700;min-width:32px;text-align:center}
#canvasWrap{position:relative;flex:1;display:flex;align-items:stretch}
canvas{display:block;width:100%}
#pwrWrap{height:5px;background:#111;border-top:1px solid #1a1a2e}
#pwr{height:100%;width:0%;background:linear-gradient(90deg,#00ff87,#ffcc00,#ff3333);transition:width .04s linear}
#overlay{position:absolute;inset:0;background:rgba(4,5,9,0.97);display:flex;flex-direction:column;justify-content:center;align-items:center;padding:20px;text-align:center;z-index:20}
#overlay h2{font-family:'Courier New',monospace;font-size:18px;color:#dfb857;text-transform:uppercase;letter-spacing:2px;margin-bottom:12px}
#overlay p{font-size:11px;color:#7e87a0;line-height:1.7;max-width:260px;margin-bottom:16px}
.controls{font-size:10px;color:#00ffaa;text-align:left;background:rgba(0,255,170,0.04);padding:12px;border-radius:6px;border:1px solid rgba(0,255,170,0.1);margin-bottom:16px;line-height:2}
.btn{background:#39A900;color:#fff;border:none;padding:11px 28px;font-size:11px;font-weight:700;border-radius:6px;cursor:pointer;text-transform:uppercase;font-family:'Courier New',monospace;letter-spacing:1px;transition:.15s}
.btn:hover{background:#47cc00;transform:translateY(-1px)}
#right{width:200px;background:#06070a;border-left:1px solid #181826;display:flex;flex-direction:column;padding:14px}
#right h3{font-size:10px;color:#dfb857;text-transform:uppercase;letter-spacing:1px;text-align:center;border-bottom:1px solid #1c1c2e;padding-bottom:8px;margin-bottom:10px;font-family:'Courier New',monospace}
#phase{background:#0d1a0d;color:#00ffaa;text-align:center;padding:6px;border-radius:5px;font-size:9px;font-weight:700;letter-spacing:1px;margin-bottom:12px;border:1px solid rgba(0,255,170,0.1)}
#fixtures{flex:1;overflow-y:auto}
.fx{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);padding:7px 8px;border-radius:5px;margin-bottom:6px;font-size:9px;display:flex;justify-content:space-between;align-items:center;color:#ccc}
.vs{color:#dfb857;font-weight:700;font-size:9px}
.myfix{border-color:rgba(57,169,0,0.3);background:rgba(57,169,0,0.05)}
#keys{margin-top:10px;border-top:1px solid #181826;padding-top:10px;font-size:8px;color:#3a3d52;line-height:1.9}
</style>
<div id="wrap">
  <div id="left">
    <div id="hud">
      <div class="htm" id="hnl">COLOMBIA</div>
      <div id="score"><span id="sl">0</span> - <span id="sv">0</span></div>
      <div id="timer">90'</div>
      <div class="htr" id="hnr">RIVAL</div>
    </div>
    <div id="canvasWrap">
      <canvas id="c"></canvas>
      <div id="overlay">
        <h2>⚽ FIFA 2026</h2>
        <p>Motor Nokia Soccer. Mueve tu jugador, pasa y dispara al arco. Clasifica en cada ronda para llegar a la final.</p>
        <div class="controls">⬆⬇⬅➡ / WASD — Mover<br>X o M — Pasar al compañero<br>ESPACIO — Cargar tiro (suelta)</div>
        <div style="margin-bottom:14px">
          <label style="font-size:10px;color:#7e87a0;display:block;margin-bottom:6px">Nombre tu selección:</label>
          <input id="teamName" value="COLOMBIA" maxlength="12" style="background:#111;border:1px solid #39A900;color:#00ff87;padding:6px 10px;border-radius:4px;font-family:'Courier New',monospace;font-size:11px;text-transform:uppercase;width:160px;text-align:center">
        </div>
        <button class="btn" onclick="startTournament()">Iniciar Torneo</button>
      </div>
    </div>
    <div id="pwrWrap"><div id="pwr"></div></div>
  </div>
  <div id="right">
    <h3>📋 Cuadro</h3>
    <div id="phase">CUARTOS</div>
    <div id="fixtures"></div>
    <div id="keys">⬆⬇⬅➡ Mover<br>X Pasar<br>SPACE Tiro<br>Mobile: Toca canvas</div>
  </div>
</div>
<script>
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
const W=380,H=560;
canvas.width=W;canvas.height=H;

const RIVALS=[
  {n:'BRASIL',c1:'#009c3b',c2:'#ffdf00'},{n:'ARGENTINA',c1:'#74acdf',c2:'#fff'},
  {n:'FRANCIA',c1:'#002395',c2:'#ed2939'},{n:'ALEMANIA',c1:'#000',c2:'#fff'},
  {n:'ESPAÑA',c1:'#c60b1e',c2:'#f1bf00'},{n:'INGLAT.',c1:'#003099',c2:'#fff'},
  {n:'PORTUGAL',c1:'#006600',c2:'#ff0000'},{n:'MEXICO',c1:'#006847',c2:'#fff'},
  {n:'USA',c1:'#002868',c2:'#bf0a30'},{n:'JAPON',c1:'#bc002d',c2:'#fff'},
  {n:'MARRUECOS',c1:'#c1272d',c2:'#006233'},{n:'SENEGAL',c1:'#00853f',c2:'#fcd116'},
  {n:'AUSTRALIA',c1:'#003087',c2:'#ffb81c'},{n:'CROACIA',c1:'#ff0000',c2:'#fff'},
  {n:'HOLANDA',c1:'#ff6600',c2:'#fff'},{n:'BELGICA',c1:'#000',c2:'#fdda24'},
  {n:'SUIZA',c1:'#d52b1e',c2:'#fff'},{n:'DINAMARCA',c1:'#c8102e',c2:'#fff'},
  {n:'SUECIA',c1:'#006aa7',c2:'#fecc02'},{n:'IRAN',c1:'#239f40',c2:'#fff'},
  {n:'COREA',c1:'#c60c30',c2:'#003478'},{n:'ECUADOR',c1:'#ffda00',c2:'#003087'},
  {n:'URUGUAY',c1:'#75aadb',c2:'#fff'},{n:'CHILE',c1:'#d52b1e',c2:'#fff'},
  {n:'PERU',c1:'#d91023',c2:'#fff'},{n:'QATAR',c1:'#8d1b3d',c2:'#fff'},
];

const PHASES=['CUARTOS','SEMIFINAL','GRAN FINAL'];
let myName='COLOMBIA',myC1='#ffcd00',myC2='#003087';
let phase=0,alive=true;
let rivals=[],fixture=[];
let score=[0,0],timer=90;
let gfavor=0,gcontra=0,pts=0,played=0;
let rivalData=null;

let ball={x:W/2,y:H/2,vx:0,vy:0,r:6,owner:null};
let team=[],cpu=[];
let keys={};
let shooting=false,shotPower=0;
let loopG=null,loopT=null;
let matchOver=false;

function rndRivals(){
  let arr=[...RIVALS].sort(()=>Math.random()-.5);
  rivals=arr;
  rivalData=arr[0];
  buildFixture();
}

function buildFixture(){
  fixture=[
    {h:myName,a:rivalData.n,mine:true},
    {h:rivals[1]?.n||'BOT A',a:rivals[2]?.n||'BOT B'},
    {h:rivals[3]?.n||'BOT C',a:rivals[4]?.n||'BOT D'},
    {h:rivals[5]?.n||'BOT E',a:rivals[6]?.n||'BOT F'},
  ];
  renderFixture();
}

function renderFixture(){
  const el=document.getElementById('fixtures');
  el.innerHTML='';
  fixture.forEach(f=>{
    const d=document.createElement('div');
    d.className='fx'+(f.mine?' myfix':'');
    d.innerHTML=`<span>${f.h.substring(0,8)}</span><span class="vs">VS</span><span>${f.a.substring(0,8)}</span>`;
    el.appendChild(d);
  });
}

function startTournament(){
  myName=(document.getElementById('teamName')?.value||'COLOMBIA').toUpperCase().substring(0,12);
  document.getElementById('hnl').innerText=myName;
  rndRivals();
  document.getElementById('hnr').innerText=rivalData.n.substring(0,10);
  document.getElementById('phase').innerText=PHASES[phase]||'CAMPEÓN';
  document.getElementById('overlay').style.display='none';
  initMatch();
}

function initMatch(){
  score=[0,0];timer=90;matchOver=false;
  document.getElementById('sl').innerText='0';
  document.getElementById('sv').innerText='0';
  document.getElementById('timer').innerText='90\'';
  ball={x:W/2,y:H/2,vx:0,vy:0,r:6,owner:null};
  buildPlayers();
  if(loopG)clearInterval(loopG);
  if(loopT)clearInterval(loopT);
  loopG=setInterval(frame,1000/60);
  loopT=setInterval(tick,1000);
}

function buildPlayers(){
  const rc1=rivalData?.c1||'#ff0044';
  const rc2=rivalData?.c2||'#fff';
  team=[
    {id:0,role:'POR',x:W/2,y:H-40,vx:0,vy:0,r:10,c1:'#ffaa00',c2:'#fff',dx:0,dy:-1,ac:0,mv:false},
    {id:1,role:'DEF',x:120,y:H-110,vx:0,vy:0,r:10,c1:myC1,c2:myC2,dx:0,dy:-1,ac:0,mv:false},
    {id:2,role:'MED',x:W/2,y:H-190,vx:0,vy:0,r:10,c1:myC1,c2:myC2,dx:0,dy:-1,ac:0,mv:false},
    {id:3,role:'DEL',x:260,y:H-270,vx:0,vy:0,r:10,c1:myC1,c2:myC2,dx:0,dy:-1,ac:0,mv:false},
  ];
  cpu=[
    {id:4,role:'POR',x:W/2,y:40,vx:0,vy:0,r:10,c1:'#00d9ff',c2:'#fff',dx:0,dy:1,ac:0,mv:false},
    {id:5,role:'DEF',x:260,y:120,vx:0,vy:0,r:10,c1:rc1,c2:rc2,dx:0,dy:1,ac:0,mv:false},
    {id:6,role:'MED',x:W/2,y:200,vx:0,vy:0,r:10,c1:rc1,c2:rc2,dx:0,dy:1,ac:0,mv:false},
    {id:7,role:'DEL',x:120,y:280,vx:0,vy:0,r:10,c1:rc1,c2:rc2,dx:0,dy:1,ac:0,mv:false},
  ];
}

function getActive(){
  let best=team[2],dmin=Infinity;
  team.forEach(p=>{
    if(p.role==='POR')return;
    const d=Math.hypot(p.x-ball.x,p.y-ball.y);
    if(d<dmin){dmin=d;best=p;}
  });
  return best||team[1];
}

function frame(){
  if(matchOver)return;
  const act=getActive();

  if(shooting){
    shotPower=Math.min(14,shotPower+0.4);
    document.getElementById('pwr').style.width=(shotPower/14*100)+'%';
  }

  let ax=0,ay=0;
  if(keys['arrowup']||keys['w']){ay=-1;act.vy-=0.6;}
  if(keys['arrowdown']||keys['s']){ay=1;act.vy+=0.6;}
  if(keys['arrowleft']||keys['a']){ax=-1;act.vx-=0.6;}
  if(keys['arrowright']||keys['d']){ax=1;act.vx+=0.6;}
  if(ax||ay){act.mv=true;act.dx=ax||act.dx;act.dy=ay||act.dy;act.ac+=0.25;}
  else act.mv=false;

  team.forEach(p=>{
    p.vx*=0.88;p.vy*=0.88;
    p.x+=p.vx;p.y+=p.vy;
    clamp(p);
  });

  runCPU(act);

  if(ball.owner){
    ball.x=ball.owner.x+ball.owner.dx*14;
    ball.y=ball.owner.y+ball.owner.dy*14;
    ball.vx=ball.owner.vx;ball.vy=ball.owner.vy;
    const enemies=ball.owner.id<4?cpu:team;
    enemies.forEach(e=>{
      if(e.role!=='POR'&&Math.hypot(e.x-ball.x,e.y-ball.y)<e.r+ball.r+5)ball.owner=e;
    });
  } else {
    ball.vx*=0.97;ball.vy*=0.97;
    ball.x+=ball.vx;ball.y+=ball.vy;
    [...team,...cpu].forEach(p=>{
      if(Math.hypot(p.x-ball.x,p.y-ball.y)<p.r+ball.r+5)ball.owner=p;
    });
  }

  if(ball.x-ball.r<18){ball.x=18+ball.r;ball.vx*=-0.8;ball.owner=null;}
  if(ball.x+ball.r>W-18){ball.x=W-18-ball.r;ball.vx*=-0.8;ball.owner=null;}

  if(ball.y<=8){
    if(ball.x>W/2-52&&ball.x<W/2+52){
      score[0]++;document.getElementById('sl').innerText=score[0];
      gfavor++;resetBall();
    } else {ball.y=8+ball.r;ball.vy*=-0.8;ball.owner=null;}
  }
  if(ball.y>=H-8){
    if(ball.x>W/2-52&&ball.x<W/2+52){
      score[1]++;document.getElementById('sv').innerText=score[1];
      gcontra++;resetBall();
    } else {ball.y=H-8-ball.r;ball.vy*=-0.8;ball.owner=null;}
  }

  draw();
}

function tick(){
  if(matchOver)return;
  timer--;
  document.getElementById('timer').innerText=timer+'\'';
  if(timer<=0)endMatch();
}

function resetBall(){
  ball.x=W/2;ball.y=H/2;ball.vx=0;ball.vy=0;ball.owner=null;
}

function clamp(p){p.x=Math.max(20,Math.min(W-20,p.x));p.y=Math.max(20,Math.min(H-20,p.y));}

function runCPU(act){
  // GK tracking
  const gk=team[0];
  gk.x+=(ball.x-gk.x)*0.1;
  gk.x=Math.max(W/2-55,Math.min(W/2+55,gk.x));

  team.forEach(p=>{
    if(p.id===act.id||p.role==='POR')return;
    const ty=ball.y+(p.role==='DEF'?90:-10);
    p.y+=(ty-p.y)*0.04;p.x+=(ball.x-p.x)*0.025;clamp(p);
  });

  const cgk=cpu[0];
  cgk.x+=(ball.x-cgk.x)*0.1;
  cgk.x=Math.max(W/2-55,Math.min(W/2+55,cgk.x));

  cpu.forEach(r=>{
    if(r.role==='POR')return;
    if(ball.owner===r){
      r.dx=0;r.dy=1;
      const a=Math.atan2(H-10-ball.y,W/2-ball.x);
      ball.owner=null;ball.vx=Math.cos(a)*8.5;ball.vy=Math.sin(a)*8.5;
    } else {
      r.mv=true;
      const a=Math.atan2(ball.y-r.y,ball.x-r.x);
      r.dx=Math.cos(a)>0?1:-1;r.dy=Math.sin(a)>0?1:-1;
      r.x+=Math.cos(a)*2.0;r.y+=Math.sin(a)*2.0;r.ac+=0.18;clamp(r);
    }
  });
}

function shoot(){
  const act=getActive();
  if(ball.owner===act){
    ball.owner=null;
    const a=Math.atan2(8-ball.y,W/2-ball.x);
    const f=Math.max(6,shotPower);
    ball.vx=Math.cos(a)*f;ball.vy=Math.sin(a)*f;
  }
}

function pass(){
  const act=getActive();
  if(ball.owner===act){
    const mates=team.filter(p=>p.id!==act.id&&p.role!=='POR');
    if(!mates.length)return;
    const t=mates.sort((a,b)=>a.y-b.y)[0];
    ball.owner=null;
    const a=Math.atan2(t.y-ball.y,t.x-ball.x);
    ball.vx=Math.cos(a)*9;ball.vy=Math.sin(a)*9;
  }
}

function draw(){
  ctx.clearRect(0,0,W,H);
  // Field
  ctx.fillStyle='#1a5c2a';ctx.fillRect(0,0,W,H);
  // Stripes
  for(let i=0;i<H;i+=70){
    ctx.fillStyle=i%140===0?'rgba(0,0,0,0.07)':'rgba(255,255,255,0.03)';
    ctx.fillRect(0,i,W,35);
  }
  // Lines
  ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=2;
  ctx.strokeRect(18,8,W-36,H-16);
  ctx.beginPath();ctx.moveTo(18,H/2);ctx.lineTo(W-18,H/2);ctx.stroke();
  ctx.beginPath();ctx.arc(W/2,H/2,52,0,Math.PI*2);ctx.stroke();
  // Penalty areas
  ctx.strokeRect(W/2-60,8,120,68);ctx.strokeRect(W/2-60,H-76,120,68);
  // Goals
  ctx.fillStyle='rgba(255,255,255,0.18)';
  ctx.fillRect(W/2-52,0,104,8);ctx.fillRect(W/2-52,H-8,104,8);

  // Radar mini
  drawRadar();

  // Players
  const act=getActive();
  [...team,...cpu].forEach(p=>drawPlayer(p,p===act));

  // Ball
  ctx.fillStyle='rgba(0,0,0,0.3)';
  ctx.beginPath();ctx.ellipse(ball.x+3,ball.y+4,ball.r,ball.r*0.5,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#222';ctx.lineWidth=0.8;ctx.stroke();
  // Pentagons
  ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=0.5;
  for(let i=0;i<6;i++){
    const a=i/6*Math.PI*2;
    ctx.beginPath();ctx.arc(ball.x+Math.cos(a)*3,ball.y+Math.sin(a)*3,1.5,0,Math.PI*2);ctx.stroke();
  }
}

function drawPlayer(p,isActive){
  ctx.save();
  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();ctx.ellipse(p.x,p.y+13,p.r-1,4,0,0,Math.PI*2);ctx.fill();
  // Selection ring
  if(isActive){
    ctx.strokeStyle='#00ffaa';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(p.x,p.y,p.r+8,0,Math.PI*2);ctx.stroke();
  }
  ctx.translate(p.x,p.y);
  // Legs
  const leg=p.mv?Math.sin(p.ac)*5:0;
  ctx.fillStyle='#1a1a2e';
  ctx.fillRect(-6,8+leg,4,5);ctx.fillRect(2,8-leg,4,5);
  // Boots
  ctx.fillStyle='#111';
  ctx.fillRect(-7,12+leg,5,2);ctx.fillRect(1,12-leg,5,2);
  // Body
  ctx.fillStyle=p.c1;ctx.fillRect(-8,-5,16,13);
  // Sleeves
  ctx.fillStyle=p.c2;ctx.fillRect(-10,-5,3,7);ctx.fillRect(7,-5,3,7);
  // Head
  ctx.fillStyle='#e8c49a';ctx.beginPath();ctx.arc(0,-10,5.5,0,Math.PI*2);ctx.fill();
  // Hair
  ctx.fillStyle=p.id<4?'#3d2008':'#111';
  ctx.beginPath();ctx.arc(0,-12,5.5,Math.PI,0);ctx.fill();
  // Role badge
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(-8,-21,16,9);
  ctx.fillStyle='#fff';ctx.font='bold 7px monospace';ctx.textAlign='center';ctx.fillText(p.role,0,-14);
  ctx.restore();
}

function drawRadar(){
  const rw=60,rh=40,rx=W-68,ry=H-52;
  ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(rx,ry,rw,rh);
  ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;ctx.strokeRect(rx,ry,rw,rh);
  const mx=x=>rx+x/W*rw, my=y=>ry+y/H*rh;
  team.forEach(p=>{ctx.fillStyle='#39A900';ctx.fillRect(mx(p.x)-1.5,my(p.y)-1.5,3,3);});
  cpu.forEach(p=>{ctx.fillStyle='#ff4444';ctx.fillRect(mx(p.x)-1.5,my(p.y)-1.5,3,3);});
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(mx(ball.x),my(ball.y),2,0,Math.PI*2);ctx.fill();
}

function endMatch(){
  matchOver=true;
  clearInterval(loopG);clearInterval(loopT);
  played++;
  const ov=document.getElementById('overlay');
  ov.style.display='flex';
  const win=score[0]>score[1],draw=score[0]===score[1];
  if(win)pts+=3;else if(draw)pts+=1;

  if(win&&phase<PHASES.length-1){
    phase++;
    alive=true;
    const nxtRival=rivals[Math.floor(Math.random()*(rivals.length-1))+1]||rivals[0];
    rivalData=nxtRival;
    document.getElementById('hnr').innerText=nxtRival.n.substring(0,10);
    document.getElementById('phase').innerText=PHASES[phase]||'CAMPEÓN';
    fixture.unshift({h:myName,a:nxtRival.n,mine:true});
    renderFixture();
    ov.innerHTML=`<h2>✅ CLASIFICADO</h2>
    <p>Ganaste ${score[0]}-${score[1]}. Avanzas a <b>${PHASES[phase]}</b>.<br>Goles: ${gfavor} favor / ${gcontra} contra. Pts: ${pts}</p>
    <button class="btn" onclick="nextMatch()">Jugar ${PHASES[phase]}</button>`;
  } else if(win&&phase>=PHASES.length-1){
    phase++;
    ov.innerHTML=`<h2>🏆 CAMPEÓN MUNDIAL</h2>
    <p>${myName} conquista la Copa del Mundo 2026.<br>Victorias: ${played} partidos / Goles: ${gfavor}-${gcontra} / Puntos: ${pts}</p>
    <button class="btn" onclick="resetAll()">Jugar de nuevo</button>`;
  } else {
    alive=false;
    ov.innerHTML=`<h2>❌ ELIMINADO</h2>
    <p>Perdiste ${score[0]}-${score[1]} en ${PHASES[phase]}.<br>Goles: ${gfavor}-${gcontra} / Puntos: ${pts}</p>
    <button class="btn" onclick="resetAll()">Reintentar</button>`;
  }
}

function nextMatch(){
  document.getElementById('overlay').style.display='none';
  initMatch();
}

function resetAll(){
  phase=0;alive=true;rivals=[];fixture=[];gfavor=0;gcontra=0;pts=0;played=0;
  const ov=document.getElementById('overlay');
  ov.innerHTML=`<h2>⚽ FIFA 2026</h2>
  <p>Motor Nokia Soccer. Mueve tu jugador, pasa y dispara al arco.</p>
  <div class="controls">⬆⬇⬅➡ / WASD — Mover<br>X o M — Pasar al compañero<br>ESPACIO — Cargar tiro (suelta)</div>
  <div style="margin-bottom:14px">
    <label style="font-size:10px;color:#7e87a0;display:block;margin-bottom:6px">Nombre tu selección:</label>
    <input id="teamName" value="${myName}" maxlength="12" style="background:#111;border:1px solid #39A900;color:#00ff87;padding:6px 10px;border-radius:4px;font-family:'Courier New',monospace;font-size:11px;text-transform:uppercase;width:160px;text-align:center">
  </div>
  <button class="btn" onclick="startTournament()">Iniciar Torneo</button>`;
  ov.style.display='flex';
  score=[0,0];timer=90;matchOver=false;
  clearInterval(loopG);clearInterval(loopT);
  draw();
}

// Keyboard
window.addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  keys[k]=true;
  if(k===' '){e.preventDefault();if(!shooting){shooting=true;shotPower=0;}}
  if(k==='x'||k==='m'){e.preventDefault();pass();}
});
window.addEventListener('keyup',e=>{
  const k=e.key.toLowerCase();
  keys[k]=false;
  if(k===' '){e.preventDefault();shoot();shooting=false;shotPower=0;document.getElementById('pwr').style.width='0%';}
});

// Touch controls for mobile
let touchStart=null;
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();
  touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!touchStart)return;
  const dx=e.touches[0].clientX-touchStart.x;
  const dy=e.touches[0].clientY-touchStart.y;
  keys['arrowleft']=dx<-15;keys['arrowright']=dx>15;
  keys['arrowup']=dy<-15;keys['arrowdown']=dy>15;
  if(!shooting&&(Math.abs(dx)>30||Math.abs(dy)>30)){shooting=true;shotPower=0;}
},{passive:false});
canvas.addEventListener('touchend',e=>{
  e.preventDefault();
  keys['arrowleft']=false;keys['arrowright']=false;keys['arrowup']=false;keys['arrowdown']=false;
  if(shooting){shoot();shooting=false;shotPower=0;document.getElementById('pwr').style.width='0%';}
  touchStart=null;
},{passive:false});

// Init draw
draw();
</script>
