<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Redirección automática al index (/) en 4 segundos -->
    <meta http-equiv="refresh" content="4;url=/" />
    <title>Registro Exitoso</title>
    <!-- Tailwind CSS para un acabado profesional instantáneo -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background: radial-gradient(circle at center, #111827 0%, #030712 100%);
        }
        @keyframes shrink {
            from { width: 100%; }
            to { width: 0%; }
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen text-white antialiased">

    <div class="bg-white/[0.03] backdrop-blur-xl border border-white/[0.08] p-8 rounded-2xl shadow-2xl max-w-sm w-full text-center transition-all duration-300">
        
        <!-- Icono de Check estilo Premium -->
        <div class="mx-auto flex items-center justify-center h-14 w-14 rounded-full bg-emerald-500/10 text-emerald-400 mb-5 border border-emerald-500/20">
            <svg class="h-7 w-7" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
                <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" />
            </svg>
        </div>
        
        <!-- Mensaje Principal -->
        <h1 class="text-2xl font-semibold mb-2 tracking-tight text-white">¡Has sido registrado!</h1>
        <p class="text-gray-400 text-sm mb-6">Tu cuenta se ha creado correctamente.</p>
        
        <!-- Barra de progreso de redirección -->
        <div class="w-full bg-white/[0.06] h-1 rounded-full overflow-hidden mb-6">
            <div class="bg-emerald-500 h-full" style="animation: shrink 4s linear forwards;"></div>
        </div>

        <!-- Botón manual por si no quieren esperar -->
        <a href="/" class="inline-block w-full py-3 px-4 bg-white/[0.07] hover:bg-white/[0.12] border border-white/[0.08] rounded-xl font-medium text-xs tracking-wide uppercase transition-all duration-200">
            Volver al inicio ya
        </a>
    </div>

</body>
</html>
