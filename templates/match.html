<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FIFA 2026 - Live Match Engine</title>
    <style>
        body {
            background-color: #030712;
            color: #fff;
            font-family: system-ui, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }
        .scoreboard {
            background: rgba(13, 20, 44, 0.85);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px 40px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 10;
        }
        .team-info { display: flex; align-items: center; gap: 15px; }
        .color-badge { width: 20px; height: 20px; border-radius: 50%; border: 2px solid #fff; }
        .team-name { font-size: 1.2rem; font-weight: bold; text-transform: uppercase; }
        .score-text { font-size: 2.5rem; font-weight: 900; color: #dfb857; font-family: monospace; }
        .timer { font-size: 1.5rem; font-weight: bold; color: #00ff87; background: rgba(0,255,135,0.1); padding: 5px 15px; border-radius: 8px; border: 1px solid rgba(0,255,135,0.3); }
        canvas {
            background: #004d2e; /* Verde cancha premium */
            border: 4px solid #dfb857;
            border-radius: 12px;
            box-shadow: 0 0 50px rgba(223, 184, 87, 0.15);
        }
        .controls-hint { margin-top: 15px; color: #8fa1cb; font-size: 0.9rem; letter-spacing: 1px; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 7, 18, 0.9); z-index: 100;
            display: none; flex-direction: column; justify-content: center; align-items: center;
        }
        #overlay h1 { font-size: 4rem; color: #dfb857; text-transform: uppercase; margin: 0; }
        .btn-save {
            margin-top: 30px; padding: 15px 40px; font-size: 1.2rem; font-weight: bold;
            background: linear-gradient(135deg, #dfb857, #b8923a); color: #000;
            border: none; border-radius: 8px; cursor: pointer; text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="scoreboard">
        <div class="team-info">
            <div class="color-badge" style="background-color: {{ partido.color_local }};"></div>
            <div class="team-name">{{ partido.local }} (TÚ)</div>
        </div>
        <div class="score-text"><span id="scoreL">0</span> - <span id="scoreV">0</span></div>
        <div class="team-info">
            <div class="team-name">{{ partido.visitante }} (IA)</div>
            <div class="color-badge" style="background-color: {{ partido.color_visitante }};"></div>
        </div>
        <div class="timer" id="timeDisplay">60s</div>
    </div>

    <!-- EL CAMPO DE JUEGO -->
    <canvas id="pitch" width="900" height="500"></canvas>
    <div class="controls-hint">Moverse: WASD o Flechas | Patear/Sprint: Espaciador</div>

    <!-- PANTALLA FIN DEL PARTIDO -->
    <div id="overlay">
        <h1>¡FIN DEL PARTIDO!</h1>
        <button class="btn-save" onclick="guardarYSalir()">Registrar Resultado en Atlas</button>
    </div>

    <script>
        const canvas = document.getElementById("pitch");
        const ctx = canvas.getContext("2d");

        // Variables inyectadas desde Flask
        const p_id = "{{ partido.documento }}";
        const colorLocal = "{{ partido.color_local }}";
        const colorVisitante = "{{ partido.color_visitante }}";

        // Motor de Físicas
        const keys = {};
        let scoreL = 0, scoreV = 0;
        let timeRemaining = 60;
        let isGameOver = false;

        // Entidades
        const ball = { x: 450, y: 250, radius: 10, vx: 0, vy: 0, speed: 0.96, color: '#fff' };
        const player = { x: 200, y: 250, radius: 18, vx: 0, vy: 0, speed: 4, color: colorLocal };
        const ai = { x: 700, y: 250, radius: 18, vx: 0, vy: 0, speed: 2.2, color: colorVisitante };
        
        // Porterías (Arcos)
        const goalWidth = 120;
        const goalL = { x: 0, y: 250 - goalWidth/2, w: 20, h: goalWidth };
        const goalR = { x: 880, y: 250 - goalWidth/2, w: 20, h: goalWidth };

        // Controles
        window.addEventListener("keydown", e => { keys[e.key] = true; });
        window.addEventListener("keyup", e => { keys[e.key] = false; });

        function resetPositions() {
            ball.x = 450; ball.y = 250; ball.vx = 0; ball.vy = 0;
            player.x = 200; player.y = 250;
            ai.x = 700; ai.y = 250;
        }

        function detectCollision(obj1, obj2) {
            let dx = obj1.x - obj2.x;
            let dy = obj1.y - obj2.y;
            let distance = Math.sqrt(dx * dx + dy * dy);
            if (distance < obj1.radius + obj2.radius) {
                // Física de rebote elástico básica
                let angle = Math.atan2(dy, dx);
                let force = 6; 
                // Patear fuerte con espaciador
                if (keys[" "] && obj1 === player) force = 12; 
                
                obj2.vx -= Math.cos(angle) * force;
                obj2.vy -= Math.sin(angle) * force;
            }
        }

        function update() {
            if (isGameOver) return;

            // Movimiento del Jugador (TÚ)
            if (keys["ArrowUp"] || keys["w"]) player.y -= player.speed;
            if (keys["ArrowDown"] || keys["s"]) player.y += player.speed;
            if (keys["ArrowLeft"] || keys["a"]) player.x -= player.speed;
            if (keys["ArrowRight"] || keys["d"]) player.x += player.speed;

            // Movimiento de la IA (Persigue el balón)
            let dxAI = ball.x - ai.x;
            let dyAI = ball.y - ai.y;
            let distAI = Math.sqrt(dxAI*dxAI + dyAI*dyAI);
            if(distAI > 0) {
                // Si la bola está cerca de su arco, defiende, si no, ataca
                let targetX = (ball.x > 450) ? ball.x - 20 : ball.x;
                ai.x += (targetX - ai.x) * 0.03;
                ai.y += (ball.y - ai.y) * 0.03;
            }

            // Físicas del Balón
            ball.x += ball.vx;
            ball.y += ball.vy;
            ball.vx *= ball.speed; // Fricción
            ball.vy *= ball.speed;

            // Colisiones con paredes
            if (ball.y - ball.radius < 0 || ball.y + ball.radius > canvas.height) ball.vy *= -1;
            if (ball.x - ball.radius < 0 || ball.x + ball.radius > canvas.width) ball.vx *= -1;
            
            // Limitar a los jugadores a la cancha
            player.x = Math.max(player.radius, Math.min(canvas.width - player.radius, player.x));
            player.y = Math.max(player.radius, Math.min(canvas.height - player.radius, player.y));
            ai.x = Math.max(ai.radius, Math.min(canvas.width - ai.radius, ai.x));
            ai.y = Math.max(ai.radius, Math.min(canvas.height - ai.radius, ai.y));

            // Colisiones Jugador-Balón
            detectCollision(player, ball);
            detectCollision(ai, ball);

            // Detectar Goles
            if (ball.x - ball.radius < 20 && ball.y > goalL.y && ball.y < goalL.y + goalL.h) {
                scoreV++; document.getElementById("scoreV").innerText = scoreV; resetPositions();
            }
            if (ball.x + ball.radius > 880 && ball.y > goalR.y && ball.y < goalR.y + goalR.h) {
                scoreL++; document.getElementById("scoreL").innerText = scoreL; resetPositions();
            }
        }

        function draw() {
            // Limpiar la cancha
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar líneas de la cancha (Estilo Neón)
            ctx.strokeStyle = "rgba(255,255,255,0.3)";
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(450, 0); ctx.lineTo(450, 500); // Línea central
            ctx.stroke();
            ctx.beginPath(); ctx.arc(450, 250, 60, 0, Math.PI * 2); ctx.stroke(); // Círculo central

            // Dibujar Arcos
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)";
            ctx.fillRect(goalL.x, goalL.y, goalL.w, goalL.h);
            ctx.fillRect(goalR.x, goalR.y, goalR.w, goalR.h);

            // Dibujar Jugador
            ctx.fillStyle = player.color;
            ctx.beginPath(); ctx.arc(player.x, player.y, player.radius, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = "#fff"; ctx.stroke();

            // Dibujar IA
            ctx.fillStyle = ai.color;
            ctx.beginPath(); ctx.arc(ai.x, ai.y, ai.radius, 0, Math.PI*2); ctx.fill();
            ctx.stroke();

            // Dibujar Balón
            ctx.fillStyle = ball.color;
            ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI*2); ctx.fill();
        }

        function gameLoop() {
            update();
            draw();
            if(!isGameOver) requestAnimationFrame(gameLoop);
        }

        // Cronómetro
        const timerInterval = setInterval(() => {
            timeRemaining--;
            document.getElementById("timeDisplay").innerText = timeRemaining + "s";
            if (timeRemaining <= 0) {
                clearInterval(timerInterval);
                isGameOver = true;
                document.getElementById("overlay").style.display = "flex";
            }
        }, 1000);

        function guardarYSalir() {
            // Redireccionar al backend de Python para actualizar MongoDB
            window.location.href = `/guardar_resultado/${p_id}/${scoreL}/${scoreV}`;
        }

        gameLoop();
    </script>
</body>
</html>
