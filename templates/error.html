<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>FIFA Cloud Exception Center</title>
    <style>
        body { background-color: #0b0101; color: #ff5555; font-family: monospace; padding: 40px; display: flex; justify-content: center; }
        .error-card { max-width: 650px; width: 100%; border: 2px solid #ff5555; padding: 30px; background: #000; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        .log-box { background: #1a0303; border-left: 5px solid #ff1111; padding: 15px; margin-top: 15px; color: #ffcccc; overflow-x: auto; }
    </style>
</head>
<body>
<div class="error-card">
    <h2>⚠️ CONTROL DE EXCEPCIONES DETECTADO</h2>
    <p>La aplicación interceptó de forma segura un fallo del servidor o base de datos empleando la sentencia <strong>Try - Except</strong>.</p>
    <div class="log-box">
        <strong>Error presentado al usuario:</strong><br><br>
        {{ error_mensaje }}
    </div>
    <br>
    <a href="/" style="color: white; text-decoration: underline;">🔄 Reintentar Conexión</a>
</div>
</body>
</html>
