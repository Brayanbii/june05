<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Excepción del Sistema Interceptada</title>
    <style>
        body { background-color: #0c0202; color: #ff4d4d; font-family: monospace; padding: 40px; display: flex; justify-content: center; }
        .error-container { max-width: 650px; width: 100%; border: 2px solid #ff4d4d; padding: 30px; background: #000; box-shadow: 0 0 20px rgba(255,0,0,0.3); }
        .error-log { background: #1c0404; border-left: 5px solid #ff1111; padding: 15px; margin-top: 15px; color: #ffcccc; overflow-x: auto; }
    </style>
</head>
<body>
<div class="error-container">
    <h2>⚠️ EXCEPCIÓN CONTROLADA DETECTADA (TRY - EXCEPT)</h2>
    <p>El servidor ha capturado de manera segura un fallo inesperado del sistema para prevenir un colapso en producción.</p>
    <div class="error-log">
        <strong>Detalle del error presentado al usuario:</strong><br><br>
        {{ error_mensaje }}
    </div>
    <br>
    <a href="/" style="color: white; text-decoration: underline;">🔄 Reintentar Acción de Conexión</a>
</div>
</body>
</html>
