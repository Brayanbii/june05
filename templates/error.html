<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Critical System Error</title>
    <style>
        body {
            background-color: #120202;
            color: #ff4444;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container-error {
            border: 3px dashed #ff4444;
            background: #000;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0px 0px 25px rgba(255, 0, 0, 0.4);
            text-align: center;
        }
        h1 {
            font-size: 1.4rem;
            text-transform: uppercase;
            border-bottom: 2px solid #ff4444;
            padding-bottom: 10px;
            margin-top: 0;
        }
        .box-log {
            text-align: left;
            background: #210404;
            padding: 15px;
            border-left: 6px solid #ff1111;
            font-size: 0.9rem;
            color: #ff9999;
            word-break: break-all;
        }
        .btn-retry {
            display: inline-block;
            margin-top: 20px;
            padding: 8px 16px;
            background-color: #ff4444;
            color: #000;
            text-decoration: none;
            font-weight: bold;
            text-transform: uppercase;
        }
        .btn-retry:hover { background-color: #ff7777; }
    </style>
</head>
<body>

<div class="container-error">
    <div style="font-size: 2.5rem; margin-bottom: 10px;">⚠️ CONTROL DE EXCEPCIONES</div>
    <h1>{{ titulo_error }}</h1>
    <div class="box-log">
        <strong>Mensaje de Error enviado al Cliente:</strong><br><br>
        {{ error_mensaje }}
    </div>
    <p style="font-size: 0.75rem; color: #888; margin-top: 15px;">
        El servidor detuvo la ejecución controlada usando bloques Try-Except para prevenir un colapso inesperado.
    </p>
    <a href="/" class="btn-retry">🔄 Reintentar Conexión</a>
</div>

</body>
</html>
