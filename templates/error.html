<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Excepción Crítica Detectada</title>
    <style>
        body {
            background-color: #1a0303;
            color: #ff5555;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .box-error {
            border: 3px dashed #ff5555;
            background: #000;
            padding: 30px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0px 0px 20px rgba(255, 0, 0, 0.5);
            text-align: center;
        }
        .log-mensaje {
            text-align: left;
            background: #2a0808;
            padding: 15px;
            border-left: 5px solid #ff1111;
            font-size: 0.9rem;
            color: #ffcccc;
            word-break: break-all;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="box-error">
    <div style="font-size: 3rem; margin-bottom: 10px;">⚠️ Try - Except</div>
    <h2>EXCEPCIÓN DE SERVIDOR / BASE DE DATOS</h2>
    <div class="log-mensaje">
        <strong>Error presentado al usuario:</strong><br><br>
        {{ error_mensaje }}
    </div>
    <p style="font-size: 0.8rem; color: #aaa; margin-top: 20px;">
        La aplicación interceptó de forma segura el colapso del sistema y renderizó esta advertencia controlada.
    </p>
    <a href="/" style="color: #fff; text-decoration: underline; font-size: 0.9rem;">🔄 Reintentar Conexión</a>
</div>

</body>
</html>
